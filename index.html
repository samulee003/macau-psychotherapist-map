<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>澳門註冊心理治療師執業地點地圖</title>
  <meta name="description" content="在地圖上查找澳門註冊心理治療師的執業地點分布。資料來源：澳門衛生局官方名冊。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- 側邊控制面板 -->
    <aside id="sidebar" class="sidebar">
      <header class="sidebar__header">
        <h1 class="sidebar__title">澳門註冊心理治療師<br>執業地點地圖</h1>
        <button id="sidebar-toggle" class="sidebar__toggle" aria-label="收合側欄" title="收合側欄">
          <span class="icon icon--collapse">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </span>
        </button>
      </header>

      <!-- 搜尋 -->
      <section class="search">
        <div class="search__wrapper">
          <svg class="search__icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            id="search-input"
            class="search__input"
            type="search"
            placeholder="搜尋治療師姓名、機構或地址…"
            autocomplete="off"
          />
        </div>
        <div id="search-results-count" class="search__count"></div>
      </section>

      <!-- 分類篩選 -->
      <section id="filters" class="filters">
        <h2 class="filters__title">機構類型</h2>
        <div id="filter-list" class="filters__list">
          <!-- 由 JS 渲染 -->
        </div>
      </section>

      <!-- 地點列表 -->
      <section class="list">
        <h2 class="list__title">執業地點 <span id="list-count" class="list__count"></span></h2>
        <ul id="location-list" class="list__items">
          <!-- 由 JS 渲染 -->
        </ul>
      </section>

      <!-- 資訊頁尾（來源由 JS 動態填入，見 main.js） -->
      <footer class="sidebar__footer">
        <p class="sidebar__source">
          資料來源：<a id="meta-source-link" href="#" target="_blank" rel="noopener">—</a>
        </p>
        <p class="sidebar__official">
          權威核實：<a id="meta-official-link" href="https://www.ssm.gov.mo/pubssmweb/register/frmShowRegister.aspx" target="_blank" rel="noopener">衛生局官方查詢</a>
        </p>
        <p class="sidebar__collected">採集日期：<span id="collected-at">—</span></p>
        <p class="sidebar__sorting">排序規則：按機構及姓名筆劃客觀排序，無推廣偏私</p>
        <p class="sidebar__disclaimer" id="meta-disclaimer">
          本網站非官方機構，資料僅供參考，可能延遲或不完整，不構成醫療建議或轉介。
        </p>
      </footer>
    </aside>

    <!-- 側欄收合後的展開鈕 -->
    <button id="sidebar-open" class="sidebar-open" aria-label="展開側欄" title="展開側欄" hidden>
      <span class="icon icon--expand">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
    </button>

    <!-- 地圖 -->
    <main id="map-container" class="map-container"></main>

    <!-- 詳情抽屜（底部，行動裝置友善） -->
    <div id="detail-drawer" class="drawer" hidden>
      <div class="drawer__handle" id="drawer-handle"></div>
      <button id="drawer-close" class="drawer__close" aria-label="關閉">✕</button>
      <div id="detail-content" class="drawer__content">
        <!-- 由 JS 渲染 -->
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
