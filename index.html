<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>澳門註冊心理治療師執業地點地圖</title>
  <meta name="description" content="在地圖上查找澳門註冊心理治療師的執業地點分布。資料來源：澳門衛生局官方名冊。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- 側邊控制面板（桌面版側欄 / 手機版隱藏） -->
    <aside id="sidebar" class="sidebar">
      <header class="sidebar__header">
        <h1 class="sidebar__title">澳門註冊心理治療師<br>執業地點地圖</h1>
        <button id="sidebar-toggle" class="sidebar__toggle" aria-label="收合側欄" title="收合側欄">
          <span class="icon icon--collapse">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </span>
        </button>
      </header>

      <!-- 桌面版搜尋/AI 觸發按鈕 -->
      <div id="desktop-search-trigger" class="sidebar__search-trigger" role="button" tabindex="0" title="開啟搜尋與 AI 助理 (快捷鍵: ⌘K 或 Ctrl+K)">
        <span class="search-trigger__icon">🔍</span>
        <span class="search-trigger__placeholder">搜尋機構、治療師或問問 AI...</span>
        <span class="search-trigger__shortcut">⌘K</span>
      </div>

      <!-- 分類篩選 -->
      <section id="filters" class="filters">
        <h2 class="filters__title">機構類型</h2>
        <div id="filter-list" class="filters__list">
          <!-- 由 JS 渲染 -->
        </div>
      </section>

      <!-- 地點列表 -->
      <section class="list">
        <h2 class="list__title">執業地點 <span id="list-count" class="list__count"></span></h2>
        <ul id="location-list" class="list__items">
          <!-- 由 JS 渲染 -->
        </ul>
      </section>

      <!-- 資訊頁尾（來源由 JS 動態填入，見 main.js） -->
      <footer class="sidebar__footer">
        <div class="sidebar__footer-meta">
          <span>來源：<a id="meta-source-link" href="#" target="_blank" rel="noopener">—</a></span>
          <span class="footer-divider">|</span>
          <span><a id="meta-official-link" href="https://www.ssm.gov.mo/pubssmweb/register/frmShowRegister.aspx" target="_blank" rel="noopener">官方核實</a></span>
          <span class="footer-divider">|</span>
          <span>採集：<span id="collected-at">—</span></span>
        </div>
        <p class="sidebar__disclaimer" id="meta-disclaimer">
          本網站非官方機構，資料僅供參考，可能延遲或不完整，不構成醫療建議或轉介。
        </p>
        <div id="sidebar-resizer" class="sidebar__resizer"></div>
      </footer>
    </aside>

    <!-- 側欄收合後的展開鈕（桌面版） -->
    <button id="sidebar-open" class="sidebar-open" aria-label="展開側欄" title="展開側欄" hidden>
      <span class="icon icon--expand">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
    </button>

    <!-- 地圖（桌面版主體 / 手機版上半屏） -->
    <main id="map-container" class="map-container"></main>

    <!-- ============ 桌面版專屬：Spotlight 搜尋與 AI 模態框 ============ -->
    <div id="desktop-search-backdrop" class="search-backdrop" hidden>
      <div id="copilot-sidebar-container" class="search-modal search-ai">
        <!-- 由 copilot.js 動態填充內容 -->
      </div>
    </div>

    <!-- ============ 手機版專屬：上下分屏結構 ============ -->
    <!-- 分屏拖曳把手 -->
    <div id="split-handle" class="split-handle" aria-label="拖曳調整地圖與列表比例" role="separator"></div>

    <!-- 手機版下半屏：列表區（含搜尋、分類、列表） -->
    <section id="mobile-panel" class="mobile-panel">
      <!-- 搜尋列 -->
      <div class="mobile-panel__search">
        <div class="search__wrapper">
          <span class="search__icon">🔍</span>
          <input id="mobile-search-input" class="search__input" type="text" placeholder="搜尋機構、地址或治療師…" autocomplete="off" aria-label="搜尋" />
        </div>
      </div>

      <!-- 分類橫向滑動 -->
      <div id="mobile-filters" class="mobile-filters">
        <!-- 由 JS 渲染 -->
      </div>

      <!-- 地點列表 -->
      <div class="mobile-panel__list-wrapper">
        <h2 class="mobile-panel__title">執業地點 <span id="mobile-list-count"></span></h2>
        <ul id="mobile-location-list" class="mobile-list"></ul>
      </div>
    </section>

    <!-- 手機版浮動 AI 助理按鈕 -->
    <button id="ai-fab" class="ai-fab" aria-label="開啟 AI 智能助理">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
    </button>

    <!-- 手機版 AI 全螢幕覆蓋層 -->
    <div id="ai-overlay" class="ai-overlay" hidden>
      <header class="ai-overlay__header">
        <h2>💬 AI 智能助理</h2>
        <button id="ai-overlay-close" class="ai-overlay__close" aria-label="關閉">✕</button>
      </header>
      <!-- Copilot 容器（手機版動態掛載到此） -->
      <div id="copilot-mobile-container" class="ai-overlay__body"></div>
    </div>

    <!-- ============ 桌面版共用 / 手機版底部詳情抽屜 ============ -->
    <div id="detail-drawer" class="drawer" hidden>
      <div class="drawer__handle" id="drawer-handle"></div>
      <button id="drawer-close" class="drawer__close" aria-label="關閉">✕</button>
      <div id="detail-content" class="drawer__content">
        <!-- 由 JS 渲染 -->
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
