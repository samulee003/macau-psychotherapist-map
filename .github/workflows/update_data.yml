name: Auto Update Data

on:
  schedule:
    # 每個星期天早上 8:00 (澳門時間，即 UTC 0:00) 執行
    - cron: '0 0 * * 0'
  workflow_dispatch: # 支援手動觸發

permissions:
  contents: write # 必須授予寫入權限以推送更新數據

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests beautifulsoup4 lxml curl_cffi

      - name: Install Playwright Chromium & System dependencies
        run: |
          python -m playwright install chromium
          # 安裝 xvfb 虛擬顯示與 Playwright 系統依賴，以便在 Linux 環境中運行有界面的 Chrome (headed)
          sudo npx playwright install-deps chromium
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Scraper (Headed stealth with Xvfb)
        run: |
          # 使用 xvfb-run 模擬顯示器，繞過 Cloudflare Turnstile 驗證
          xvfb-run --server-args="-screen 0 1280x1024x24" python scripts/scrape.py

      - name: Run Geocoder
        env:
          AMAP_WEB_KEY: ${{ secrets.AMAP_WEB_KEY || '2d18f3c179911110648c3c63229da1a6' }}
        run: |
          python scripts/geocode.py

      - name: Run Data Builder
        run: |
          python scripts/build_data.py

      - name: Validate Data
        run: |
          python scripts/validate.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies & Build Frontend
        run: |
          npm ci || npm install
          npm run build

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          
          if git diff --staged --quiet; then
            echo "沒有檢測到數據變動，無需更新。"
          else
            git commit -m "auto: 衛生局註冊資料自動更新 [skip ci]"
            git push
          fi
