name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Verify dist output includes data.json
        run: |
          test -f dist/data/data.json || (echo "::error::dist/data/data.json 不存在 — closeBundle hook 可能被移除" && exit 1)
          test -f dist/manifest.webmanifest || (echo "::error::dist/manifest.webmanifest 不存在 — public/ 目錄未被複製" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate data.json
        run: python scripts/validate.py
